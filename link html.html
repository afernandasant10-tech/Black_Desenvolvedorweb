<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Links e Navegação</title>
 <style>
        /* Desafio: Criação da classe .card */
        .card {
            background-color: white;      /* Fundo branco */
            border-radius: 8px;           /* Borda arredondada */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Sombra leve */
            padding: 20px;                /* Espaçamento interno de 20px */
            border: 1px solid #eee;       /* Opcional: apenas para definir melhor o limite */
            max-width: 300px;             /* Opcional: para o card não ocupar a tela toda */
            margin: 20px 0;               /* Margem externa para separar dos outros elementos */
        }

        /* Estilo para o corpo para destacar o card branco */
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>Conteúdo do Card</h3>
    <p><a href="https://www.google.com" target="_blank">Ir para o Google</a></p>

    <p><a href="index.html">Voltar para o Início</a></p>

    <p><a href="black:exemplo@email.com">Enviar E-mail</a></p>

    <p><a href="#sessao-final">Ir para o final da página</a></p>
    
    <div style="margin-top: 1000px;"></div> <h2 id="sessao-final">Fim da Página</h2>
</body>
</html
