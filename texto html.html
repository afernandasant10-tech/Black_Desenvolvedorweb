<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formatação de Texto</title>
    <style>
        /* Regra CSS solicitada no exercício */
        h1 {
            text-align: center;            /* Texto centralizado */
            color: rgb(56, 56, 139);               /* Cor azul escuro */
            font-family: Arial, sans-serif; /* Fonte Arial ou sans-serif */
        }
    </style>
</head>
<body>
    <h1>Linguagem de Programação</h1>
    
    <p>Este é um texto em <strong>negrito forte</strong>.</p>
    <p>Este texto está em <em>itálico enfático</em>.</p>
    <p>Podemos também <u>sublinhar palavras</u>.</p>
    <p>O uso da tag <mark>mark serve para destacar</mark> algo com fundo colorido.</p>
    <p>E aqui temos um <small>texto menor</small> para notas de rodapé.</p>
</body>
</html>
