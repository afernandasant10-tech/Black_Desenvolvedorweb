<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela de Produtos</title>
    <style>
        /* Adicionei um pouco de estilo para facilitar a visualização */
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Teclado</td>
                <td>1</td>
                <td>R$ 150,00</td>
            </tr>
            <tr>
                <td>Mouse</td>
                <td>2</td>
                <td>R$ 80,00</td>
            </tr>
            <tr>
                <td>Monitor</td>
                <td>3</td>
                <td>R$ 900,00</td>
            </tr>
            <tr>
                <td>Fone</td>
                <td>4</td>
                <td>R$ 120,00</td>
            </tr>
            <tr>
                <td>Webcam</td>
                <td>5</td>
                <td>R$ 200,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><strong>Total</strong></td>
                <td><strong>R$ 1.450,00</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
