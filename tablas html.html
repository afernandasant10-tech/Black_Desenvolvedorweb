<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela de Produtos</title>
    <style>/* Configurações gerais da tabela */
table {
    width: 100%;
    border-collapse: collapse;
    font-family: Arial, sans-serif; /* Fonte mais limpa */
    margin-top: 20px;
}

/* Estilo do cabeçalho (th) */
th {
    background-color: #2c3e50; /* Azul escuro profissional */
    color: #ffffff;            /* Texto branco para contraste */
    padding: 12px;
    text-align: left;
}

/* Estilo das células (td) */
td {
    border-bottom: 1px solid #dddddd; /* Linha sutil entre itens */
    padding: 10px;
}

/* --- EFEITO ZEBRA --- */
/* Aplica uma cor de fundo apenas nas linhas pares (even) */
tbody tr:nth-child(even) {
    background-color: #f2f2f2; 
}

/* Efeito ao passar o mouse na linha da tabela */
tbody tr:hover {
    background-color: #ebf5fb; /* Azul bem clarinho */
}

/* Estilo do Rodapé */
tfoot tr {
    background-color: #ecf0f1;
    font-size: 1.1em;
}</style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody>
            <tr><td>Teclado</td><td>1<td><td>R$ 150,00</td></tr>
            <tr><td>Mouse</td><td>2</td>
                <td>R$ 80,00</td></tr>
            <tr><td>Monitor</td><td>3</td>
                <td>R$ 900,00</td></tr>
            <tr><td>Fone</td><td>4</td>
                <td>R$ 120,00</td></tr>
            <tr><td>Webcam</td><td>5</td>
                <td>R$ 200,00</td></tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"><strong>Total</strong></td>
                <td><strong>R$ 1.450,00</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
